<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Greenleaf Бишкек</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4fff4;
    }

    header {
      background: linear-gradient(90deg, #2ecc71, #27ae60);
      color: white;
      text-align: center;
      padding: 20px;
    }

    .about {
      text-align: center;
      padding: 20px;
      max-width: 800px;
      margin: auto;
    }

    h2 {
      color: #27ae60;
    }

    #product-list {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      padding: 10px;
    }

    .product {
      width: 170px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      padding: 8px;
      text-align: center;
    }

    .product img {
      width: 100%;
      border-radius: 10px;
    }

    .product button {
      margin-top: 6px;
      padding: 8px;
      border: none;
      background: #27ae60;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    .contact {
      text-align: center;
      padding: 30px;
    }

    footer {
      text-align: center;
      padding: 15px;
      background: #27ae60;
      color: white;
      margin-top: 20px;
    }
  </style>
</head>

<body>

<header>
  <h1>Greenleaf Бишкек</h1>
  <p>Экологичные товары для дома и здоровья</p>
</header>

<div class="about">
  <h2>О компании</h2>
  <p>
    Greenleaf — это натуральная продукция для дома, ухода и здоровья.
    Без химии, безопасно для всей семьи.
  </p>
</div>

<h2 style="text-align:center;">Каталог товаров</h2>
<div id="product-list"></div>

<div class="contact">
  <h2>Заказать</h2>
  <a href="https://www.instagram.com/greenleaf_bishkek14" target="_blank">
    <button style="padding:12px 20px;background:#e1306c;color:white;border:none;border-radius:10px;">
      Написать в Instagram
    </button>
  </a>
</div>

<footer>
  © 2026 Greenleaf Бишкек
</footer>

<script>
const container = document.getElementById("product-list");

for (let i = 1; i <= 84; i++) {
  container.innerHTML += `
    <div class="product">
      <img src="images/${i}.jfif" alt="product ${i}">
      <a href="https://www.instagram.com/greenleaf_bishkek14" target="_blank">
        <button>Заказать</button>
      </a>
    </div>
  `;
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Greenleaf Bishkek</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f6fff6;}

header{
background:#2e7d32;
color:white;
text-align:center;
padding:25px;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.card{
background:white;
border-radius:12px;
overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.1);
cursor:pointer;
transition:0.2s;
text-align:center;
}

.card:hover{transform:scale(1.03);}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card p{
margin:10px;
font-weight:bold;
}

.modal{
display:none;
position:fixed;
top:0;left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:20px;
border-radius:12px;
text-align:center;
max-width:300px;
}

.box img{
width:100%;
border-radius:10px;
}

.btn{
display:inline-block;
margin-top:10px;
background:#2e7d32;
color:white;
padding:10px 15px;
border-radius:20px;
text-decoration:none;
}
</style>
</head>

<body>

<header>
<h1>Greenleaf Bishkek</h1>
<p>Каталог продукции</p>
</header>

<div class="products">

<div class="card" onclick="openModal('Крем для лица','https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb','Увлажняет и питает кожу')">
<img src="https://images.unsplash.com/photo-1600185365926-3a2ce3cdb9eb">
<p>Крем для лица</p>
</div>

<div class="card" onclick="openModal('Шампунь','https://images.unsplash.com/photo-1612810436541-336d4d1b5f6c','Укрепляет волосы')">
<img src="https://images.unsplash.com/photo-1612810436541-336d4d1b5f6c">
<p>Шампунь</p>
</div>

<div class="card" onclick="openModal('Средства для дома','https://images.unsplash.com/photo-1581578731548-c64695cc6952','Экологичная уборка')">
<img src="https://images.unsplash.com/photo-1581578731548-c64695cc6952">
<p>Средства для дома</p>
</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="box">
<h2 id="title"></h2>
<img id="img">
<p id="desc"></p>

<a class="btn" href="https://www.instagram.com/greenleaf_bishkek14" target="_blank">
Заказать
</a>

<br><br>
<button onclick="closeModal()">Закрыть</button>
</div>
</div>

<script>
function openModal(title,img,desc){
document.getElementById("modal").style.display="flex";
document.getElementById("title").innerText=title;
document.getElementById("img").src=img;
document.getElementById("desc").innerText=desc;
}

function closeModal(){
document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Greenleaf Bishkek</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f8fff8;}
header{background:white;padding:20px;text-align:center;border-bottom:1px solid #ddd;}
h1{color:#2e7d32;margin:0;}
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}
.card{
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}
.card img{
width:100%;
height:180px;
object-fit:cover;
}
.card h3{
font-size:16px;
padding:10px;
margin:0;
}
.btn{
display:block;
text-align:center;
background:#2e7d32;
color:white;
padding:10px;
text-decoration:none;
}
.top-btn{
display:block;
margin:20px auto;
width:250px;
text-align:center;
background:black;
color:white;
padding:12px;
text-decoration:none;
border-radius:25px;
}
</style>
</head>

<body>

<header>
<h1>Greenleaf Bishkek</h1>
<p>Каталог продукции</p>
</header>

<a class="top-btn" href="https://greenleaf-global.com/shop/all/" target="_blank">
Смотреть все товары
</a>

<div class="products" id="products"></div>

<script>
const products = [
"face cream","shampoo","body lotion","cleaning spray","toothpaste",
"face mask","hand cream","dish soap","laundry detergent","hair oil",
"soap","shower gel","skin care","cleaning liquid","cosmetics",
"eco cleaning","beauty cream","hair shampoo","natural soap","clean house"
];

let html = "";

products.forEach(p => {
  html += `
  <div class="card">
    <img src="https://source.unsplash.com/300x200/?${p}">
    <h3>${p}</h3>
    <a class="btn" href="https://www.instagram.com/greenleaf_bishkek14" target="_blank">
      Заказать
    </a>
  </div>
  `;
});

document.getElementById("products").innerHTML = html;
</script>

</body>
</html>
